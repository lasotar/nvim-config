# ============================================================================
# Tmux Configuration - Vim-friendly
# ============================================================================

# Change prefix from Ctrl-b to Ctrl-f (easy to press with left hand)
unbind C-b
set-option -g prefix C-f
bind-key C-f send-prefix

# ============================================================================
# General Settings
# ============================================================================

# Enable 256 color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Allow passthrough for image rendering (required by image.nvim)
set -g allow-passthrough on

# Set scrollback buffer size
set -g history-limit 50000

# Start window and pane numbering at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable mouse support (optional, disable if you prefer keyboard only)
set -g mouse on

# Faster command sequences (no delay for escape key press)
set -sg escape-time 0

# Increase repeat timeout
set -sg repeat-time 600

# Enable focus events for vim
set -g focus-events on

# ============================================================================
# Vim-style Keybindings
# ============================================================================

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vim-style copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Enter copy mode with Ctrl-f [
bind [ copy-mode
bind ] paste-buffer

# Smart pane toggles with automatic focus switching
# These work by checking if nvim (pane 1) is zoomed

# Ctrl-f g - Toggle Copilot (right pane, 30% width, full height)
bind g if-shell '[ "#{window_zoomed_flag}" -eq 1 ]' \
    'resize-pane -Z ; select-pane -t 3' \
    'select-pane -t 1 ; resize-pane -Z'

# Ctrl-f t - Toggle Terminal (bottom-left pane, 30% height)
bind t if-shell '[ "#{window_zoomed_flag}" -eq 1 ]' \
    'resize-pane -Z ; select-pane -t 2' \
    'select-pane -t 1 ; resize-pane -Z'

# Quick exit - kill entire session
# Ctrl-f q to quit session (with confirmation)
bind q confirm-before -p "Kill session #S? (y/n)" kill-session

# ============================================================================
# Window Management
# ============================================================================

# Split panes with | and - (more intuitive than " and %)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Create new window in current path
bind c new-window -c "#{pane_current_path}"

# Switch windows with Alt-h/l (no prefix needed)
bind -n M-h previous-window
bind -n M-l next-window

# Switch windows with Ctrl-a n/p
bind n next-window
bind p previous-window

# ============================================================================
# Session Management
# ============================================================================

# Easy session switching
bind C-j switch-client -n
bind C-k switch-client -p

# ============================================================================
# Visual & Status Bar
# ============================================================================

# Status bar position
set -g status-position bottom

# Status bar colors (adjust to match your terminal theme)
set -g status-bg colour234
set -g status-fg colour137

# Active window highlight
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

# Inactive windows
setw -g window-status-style fg=colour138,bg=colour235
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# Status bar left side
set -g status-left '#[fg=colour232,bg=colour154,bold] #S #[fg=colour154,bg=colour238] #[fg=colour250,bg=colour238] #(whoami) '
set -g status-left-length 30

# Status bar right side
set -g status-right '#[fg=colour233,bg=colour241] %d/%m #[fg=colour233,bg=colour245] %H:%M:%S '
set -g status-right-length 50

# Pane borders
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour154

# Message text
set -g message-style fg=colour232,bg=colour166,bold

# ============================================================================
# Miscellaneous
# ============================================================================

# Reload config with Ctrl-f r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Kill pane without confirmation
bind x kill-pane

# Kill window without confirmation
bind X kill-window

# Break pane to new window
bind b break-pane -d

# Quick pane synchronization toggle
bind S set-window-option synchronize-panes\; display "Sync #{?pane_synchronized,ON,OFF}"

# Toggle status bar
bind t set-option status

# Clear screen and scrollback
bind C-l send-keys C-l \; clear-history

